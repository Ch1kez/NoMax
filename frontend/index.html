<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoMax Voice</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0f172a" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5e7eb;
      }
      main {
        max-width: 420px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      .card {
        background: #020617;
        border-radius: 16px;
        border: 1px solid #1e293b;
        padding: 16px 16px 20px;
        margin-top: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #1f2937;
        background: #020617;
        color: #e5e7eb;
        font-size: 14px;
        box-sizing: border-box;
      }
      input:focus {
        outline: 1px solid #3b82f6;
        border-color: #3b82f6;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-primary {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
      }
      .btn-secondary {
        background: #020617;
        color: #e5e7eb;
        border: 1px solid #1f2937;
      }
      .btn-small {
        padding: 6px 10px;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row + .row {
        margin-top: 8px;
      }
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .muted {
        font-size: 12px;
        color: #6b7280;
      }
      .list {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #0b1120;
        border: 1px solid #1e293b;
        font-size: 12px;
      }
      .call-card {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: #020617;
        border: 1px solid #1e293b;
        font-size: 13px;
      }
      .tag {
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid #1f2937;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top-bar">
        <div>
          <div class="chip">
            <span>🔊</span>
            <span>NoMax Voice</span>
          </div>
        </div>
        <div id="current-user-tag" class="tag" style="display: none"></div>
      </div>

      <section id="auth-card" class="card">
        <h1>Вход</h1>
        <p class="muted">Придумай логин и пароль — пока без email/SMS.</p>
        <div style="margin-top: 12px; display: flex; flex-direction: column; gap: 10px">
          <div>
            <label for="username-input">Логин</label>
            <input id="username-input" autocomplete="username" />
          </div>
          <div>
            <label for="password-input">Пароль</label>
            <input id="password-input" type="password" autocomplete="current-password" />
          </div>
          <div class="row" style="margin-top: 4px">
            <button id="login-btn" class="btn-primary" style="flex: 1">Войти</button>
            <button id="register-btn" class="btn-secondary" style="flex: 1">Регистрация</button>
          </div>
          <div id="auth-error" class="muted" style="color: #f97373"></div>
        </div>
      </section>

      <section id="app-card" class="card" style="display: none">
        <h1>Близкие</h1>
        <p class="muted">Добавь несколько логинов, чтобы тестировать звонки.</p>

        <div style="margin-top: 12px">
          <div class="row">
            <div style="flex: 1">
              <label for="contact-username-input">Логин друга</label>
              <input id="contact-username-input" placeholder="например, anna" />
            </div>
            <div>
              <label>&nbsp;</label>
              <button id="add-contact-btn" class="btn-secondary btn-small">Добавить</button>
            </div>
          </div>
          <div id="contacts-empty" class="muted" style="margin-top: 8px">Список пока пуст.</div>
          <div id="contacts-list" class="list"></div>
        </div>

        <div id="call-section" style="margin-top: 16px; display: none">
          <h2 style="font-size: 16px; margin: 0 0 4px 0">Текущий звонок</h2>
          <div id="call-info" class="call-card"></div>
        </div>
      </section>
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch(function () {
              // ignore for now
            });
        });
      }

      const state = {
        token: null,
        me: null,
        contacts: [],
        activeCall: null,
        ws: null,
        room: null,
        audioEl: null,
      };

      const $ = (id) => document.getElementById(id);

      function setAuthVisible(isAuthed) {
        $("auth-card").style.display = isAuthed ? "none" : "block";
        $("app-card").style.display = isAuthed ? "block" : "none";
        $("current-user-tag").style.display = isAuthed ? "inline-flex" : "none";
        if (isAuthed && state.me) {
          $("current-user-tag").textContent = state.me.username;
        }
      }

      async function api(path, options = {}) {
        const base = window.location.origin.replace("3000", "8000");
        const headers = Object.assign(
          { "Content-Type": "application/json" },
          options.headers || {}
        );
        if (state.token) {
          headers.Authorization = "Bearer " + state.token;
        }
        const res = await fetch(base + path, {
          ...options,
          headers,
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || res.statusText);
        }
        return res.json();
      }

      async function handleRegister() {
        const username = $("username-input").value.trim();
        const password = $("password-input").value.trim();
        $("auth-error").textContent = "";
        if (!username || !password) {
          $("auth-error").textContent = "Введите логин и пароль";
          return;
        }
        try {
          await api("/auth/register", {
            method: "POST",
            body: JSON.stringify({ username, password }),
          });
          await handleLogin();
        } catch (e) {
          $("auth-error").textContent = "Ошибка: " + (e.message || "не удалось зарегистрироваться");
        }
      }

      async function handleLogin() {
        const username = $("username-input").value.trim();
        const password = $("password-input").value.trim();
        $("auth-error").textContent = "";
        if (!username || !password) {
          $("auth-error").textContent = "Введите логин и пароль";
          return;
        }
        try {
          const base = window.location.origin.replace("3000", "8000");
          const body = new URLSearchParams();
          body.set("username", username);
          body.set("password", password);
          body.set("grant_type", "");
          body.set("scope", "");
          body.set("client_id", "");
          body.set("client_secret", "");
          const res = await fetch(base + "/auth/token", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body,
          });
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || res.statusText);
          }
          const data = await res.json();
          state.token = data.access_token;
          state.me = await api("/me");
          setAuthVisible(true);
          await refreshContacts();
          connectWebSocket();
        } catch (e) {
          $("auth-error").textContent = "Ошибка входа: " + (e.message || "проверь логин/пароль");
        }
      }

      async function refreshContacts() {
        try {
          const contacts = await api("/relationships");
          state.contacts = contacts;
          renderContacts();
        } catch {
          // ignore
        }
      }

      function renderContacts() {
        const list = $("contacts-list");
        list.innerHTML = "";
        if (!state.contacts.length) {
          $("contacts-empty").style.display = "block";
          return;
        }
        $("contacts-empty").style.display = "none";
        state.contacts.forEach((rel) => {
          const div = document.createElement("div");
          div.style.display = "flex";
          div.style.justifyContent = "space-between";
          div.style.alignItems = "center";
          div.style.gap = "8px";

          const left = document.createElement("div");
          left.innerHTML = `<div style="font-size:14px">${rel.contact.full_name || rel.contact.username}</div>
                            <div class="muted">@${rel.contact.username}</div>`;

          const btn = document.createElement("button");
          btn.textContent = "Позвонить";
          btn.className = "btn-primary btn-small";
          btn.onclick = () => startCall(rel.contact.id);

          div.appendChild(left);
          div.appendChild(btn);
          list.appendChild(div);
        });
      }

      async function addContact() {
        const username = $("contact-username-input").value.trim();
        if (!username) return;
        try {
          await api("/relationships?username=" + encodeURIComponent(username), {
            method: "POST",
          });
          $("contact-username-input").value = "";
          await refreshContacts();
        } catch (e) {
          alert("Не удалось добавить контакт: " + (e.message || ""));
        }
      }

      async function startCall(contactId) {
        try {
          const call = await api("/calls", {
            method: "POST",
            body: JSON.stringify({
              type: "one_to_one",
              participant_ids: [contactId],
            }),
          });
          await handleCallUpdated(call);
        } catch (e) {
          alert("Не удалось создать звонок: " + (e.message || ""));
        }
      }

      async function handleCallUpdated(call) {
        state.activeCall = call;
        renderCall();
        if (call.media_room && call.media_token) {
          await ensureLiveKitConnected(call);
        }
      }

      function renderCall() {
        const section = $("call-section");
        const box = $("call-info");
        if (!state.activeCall) {
          section.style.display = "none";
          box.innerHTML = "";
          return;
        }
        section.style.display = "block";
        const call = state.activeCall;
        box.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div>
              <div style="font-size:14px;margin-bottom:2px">Звонок #${call.id}</div>
              <div class="muted">${call.type === "one_to_one" ? "1‑на‑1" : "Группа"}</div>
            </div>
            <span class="tag">${call.status}</span>
          </div>
          <div class="muted" style="margin-bottom:4px">
            media_room: <code>${call.media_room || "—"}</code>
          </div>
          ${
            call.media_token
              ? '<div class="muted" style="max-width:100%;overflow-wrap:break-word">media_token получен (обрежем в UI)</div>'
              : ""
          }
        `;
      }

      async function ensureLiveKitConnected(call) {
        if (!window.Livekit) {
          console.warn("Livekit client not loaded");
          return;
        }
        const LIVEKIT_URL = window.LIVEKIT_URL || "ws://localhost:7880";
        try {
          if (!state.audioEl) {
            const audio = document.createElement("audio");
            audio.autoplay = true;
            audio.playsInline = true;
            document.body.appendChild(audio);
            state.audioEl = audio;
          }
          if (state.room) {
            await state.room.disconnect();
            state.room = null;
          }
          const { Room, RoomEvent, createLocalAudioTrack } = window.Livekit;
          const room = new Room();
          await room.connect(LIVEKIT_URL, call.media_token);
          state.room = room;

          const localAudioTrack = await createLocalAudioTrack();
          await room.localParticipant.publishTrack(localAudioTrack);

          room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
            if (track.kind === "audio" && state.audioEl) {
              track.attach(state.audioEl);
            }
          });
        } catch (e) {
          console.error("LiveKit connect error", e);
        }
      }

      function connectWebSocket() {
        try {
          const wsUrl = (window.location.origin.replace("http", "ws").replace("3000", "8000")) + "/ws/signaling";
          const ws = new WebSocket(wsUrl);
          state.ws = ws;
          ws.onopen = () => {
            if (state.me) {
              ws.send(
                JSON.stringify({
                  type: "register",
                  from_user_id: state.me.id,
                })
              );
            }
          };
          ws.onmessage = (event) => {
            // Пока просто выводим в консоль
            console.log("Signaling message", event.data);
          };
          ws.onclose = () => {
            state.ws = null;
          };
        } catch {
          // ignore
        }
      }

      $("login-btn").onclick = handleLogin;
      $("register-btn").onclick = handleRegister;
      $("add-contact-btn").onclick = addContact;
    </script>
    <script src="https://cdn.livekit.io/npm/livekit-client/latest/livekit-client.umd.min.js"></script>
  </body>
  </html>
