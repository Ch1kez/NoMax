<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NoMax Voice</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0f172a" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e5e7eb;
      }
      main {
        max-width: 420px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      .card {
        background: #020617;
        border-radius: 16px;
        border: 1px solid #1e293b;
        padding: 16px 16px 20px;
        margin-top: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #1f2937;
        background: #020617;
        color: #e5e7eb;
        font-size: 14px;
        box-sizing: border-box;
      }
      input:focus {
        outline: 1px solid #3b82f6;
        border-color: #3b82f6;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-primary {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white;
      }
      .btn-secondary {
        background: #020617;
        color: #e5e7eb;
        border: 1px solid #1f2937;
      }
      .btn-small {
        padding: 6px 10px;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .row + .row {
        margin-top: 8px;
      }
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .muted {
        font-size: 12px;
        color: #6b7280;
      }
      .list {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #0b1120;
        border: 1px solid #1e293b;
        font-size: 12px;
      }
      .call-card {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: #020617;
        border: 1px solid #1e293b;
        font-size: 13px;
      }
      .tag {
        font-size: 11px;
        padding: 2px 6px;
        border-radius: 999px;
        border: 1px solid #1f2937;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="top-bar">
        <div>
          <div class="chip">
            <span>🔊</span>
            <span>NoMax Voice</span>
          </div>
        </div>
        <div id="current-user-tag" class="tag" style="display: none"></div>
      </div>

      <section id="auth-card" class="card">
        <h1>Вход</h1>
        <p class="muted">Придумай логин и пароль — пока без email/SMS.</p>
        <div style="margin-top: 12px; display: flex; flex-direction: column; gap: 10px">
          <div>
            <label for="username-input">Логин</label>
            <input id="username-input" autocomplete="username" />
          </div>
          <div>
            <label for="password-input">Пароль</label>
            <input id="password-input" type="password" autocomplete="current-password" />
          </div>
          <div class="row" style="margin-top: 4px">
            <button id="login-btn" class="btn-primary" style="flex: 1">Войти</button>
            <button id="register-btn" class="btn-secondary" style="flex: 1">Регистрация</button>
          </div>
          <div id="auth-error" class="muted" style="color: #f97373"></div>
        </div>
      </section>

      <section id="app-card" class="card" style="display: none">
        <h1>Близкие</h1>
        <p class="muted">Добавь несколько логинов, чтобы тестировать звонки.</p>

        <div style="margin-top: 12px">
          <div class="row">
            <div style="flex: 1">
              <label for="contact-username-input">Логин друга</label>
              <input id="contact-username-input" placeholder="например, anna" />
            </div>
            <div>
              <label>&nbsp;</label>
              <button id="add-contact-btn" class="btn-secondary btn-small">Добавить</button>
            </div>
          </div>
          <div id="contacts-empty" class="muted" style="margin-top: 8px">Список пока пуст.</div>
          <div id="contacts-list" class="list"></div>
        </div>

        <div id="call-section" style="margin-top: 16px; display: none">
          <h2 style="font-size: 16px; margin: 0 0 4px 0">Текущий звонок</h2>
          <div id="call-info" class="call-card"></div>
          <div style="margin-top: 8px; text-align: right">
            <button id="end-call-btn" class="btn-secondary btn-small">Завершить</button>
          </div>
        </div>

        <div id="incoming-call-section" class="card" style="margin-top: 16px; display: none">
          <h2 style="font-size: 16px; margin: 0 0 4px 0">Входящий звонок</h2>
          <p class="muted">
            Звонок от <span id="incoming-from"></span>
          </p>
          <div class="row" style="margin-top: 8px">
            <button id="incoming-accept-btn" class="btn-primary" style="flex: 1">Принять</button>
            <button id="incoming-reject-btn" class="btn-secondary" style="flex: 1">Отклонить</button>
          </div>
        </div>
      </section>
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch(function () {
              // ignore for now
            });
        });
      }

      const state = {
        token: null,
        me: null,
        contacts: [],
        activeCall: null,
        ws: null,
        pc: null,
        audioEl: null,
        incomingCall: null,
        pendingOffer: null,
        peerUserId: null,
        pendingIceByCall: {},
        statsTimer: null,
        ringInterval: null,
        ringAudioCtx: null,
      };

      const $ = (id) => document.getElementById(id);
      const DEBUG_RTC = true;

      function rtcLog(message, payload) {
        if (!DEBUG_RTC) return;
        if (payload !== undefined) {
          console.log("[RTC]", message, payload);
        } else {
          console.log("[RTC]", message);
        }
      }

      function queueIce(callId, candidate) {
        if (!callId || !candidate) return;
        if (!state.pendingIceByCall[callId]) state.pendingIceByCall[callId] = [];
        state.pendingIceByCall[callId].push(candidate);
        rtcLog("Queued ICE candidate", { callId, queueSize: state.pendingIceByCall[callId].length });
      }

      async function flushQueuedIce(callId) {
        if (!state.pc || !callId) return;
        const queued = state.pendingIceByCall[callId] || [];
        if (!queued.length) return;
        rtcLog("Flushing queued ICE", { callId, count: queued.length });
        for (const c of queued) {
          try {
            await state.pc.addIceCandidate(new RTCIceCandidate(c));
          } catch (e) {
            rtcLog("Failed queued ICE", e);
          }
        }
        state.pendingIceByCall[callId] = [];
      }

      function startStatsMonitor(callId) {
        if (state.statsTimer) clearInterval(state.statsTimer);
        state.statsTimer = setInterval(async () => {
          if (!state.pc) return;
          try {
            const stats = await state.pc.getStats();
            let pair = null;
            stats.forEach((r) => {
              if (r.type === "transport" && r.selectedCandidatePairId) {
                pair = stats.get(r.selectedCandidatePairId);
              }
            });
            if (!pair) {
              rtcLog("No selected candidate pair yet", { callId, iceState: state.pc.iceConnectionState });
              return;
            }
            const local = stats.get(pair.localCandidateId);
            const remote = stats.get(pair.remoteCandidateId);
            rtcLog("Selected pair", {
              callId,
              iceState: state.pc.iceConnectionState,
              localType: local && local.candidateType,
              remoteType: remote && remote.candidateType,
              localAddr: local ? `${local.address}:${local.port}` : null,
              remoteAddr: remote ? `${remote.address}:${remote.port}` : null,
            });
          } catch (e) {
            rtcLog("Stats read error", e);
          }
        }, 5000);
      }

      function stopStatsMonitor() {
        if (state.statsTimer) {
          clearInterval(state.statsTimer);
          state.statsTimer = null;
        }
      }

      async function requestNotificationPermission() {
        if (!("Notification" in window)) return;
        if (Notification.permission === "default") {
          try {
            await Notification.requestPermission();
          } catch (_e) {
            // ignore
          }
        }
      }

      function showIncomingNotification(fromName) {
        if (!("Notification" in window)) return;
        if (Notification.permission !== "granted") return;
        const n = new Notification("Входящий звонок", {
          body: `Звонок от ${fromName || "контакта"}`,
          tag: "nomax-incoming-call",
          renotify: true,
        });
        n.onclick = () => {
          window.focus();
          n.close();
        };
      }

      function startIncomingAlert() {
        stopIncomingAlert();
        if (navigator.vibrate) {
          navigator.vibrate([200, 120, 200, 120, 200]);
        }
        try {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          state.ringAudioCtx = new AudioCtx();
          state.ringInterval = setInterval(() => {
            if (!state.ringAudioCtx) return;
            const osc = state.ringAudioCtx.createOscillator();
            const gain = state.ringAudioCtx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(840, state.ringAudioCtx.currentTime);
            gain.gain.setValueAtTime(0.0001, state.ringAudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.12, state.ringAudioCtx.currentTime + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, state.ringAudioCtx.currentTime + 0.2);
            osc.connect(gain).connect(state.ringAudioCtx.destination);
            osc.start();
            osc.stop(state.ringAudioCtx.currentTime + 0.22);
          }, 900);
        } catch (_e) {
          // ignore
        }
      }

      function stopIncomingAlert() {
        if (state.ringInterval) {
          clearInterval(state.ringInterval);
          state.ringInterval = null;
        }
        if (navigator.vibrate) navigator.vibrate(0);
        if (state.ringAudioCtx) {
          try {
            state.ringAudioCtx.close();
          } catch (_e) {
            // ignore
          }
          state.ringAudioCtx = null;
        }
      }

      function setAuthVisible(isAuthed) {
        $("auth-card").style.display = isAuthed ? "none" : "block";
        $("app-card").style.display = isAuthed ? "block" : "none";
        $("current-user-tag").style.display = isAuthed ? "inline-flex" : "none";
        if (isAuthed && state.me) {
          $("current-user-tag").textContent = state.me.username;
        }
      }

      async function api(path, options = {}) {
        const base = "";
        const headers = Object.assign(
          { "Content-Type": "application/json" },
          options.headers || {}
        );
        if (state.token) {
          headers.Authorization = "Bearer " + state.token;
        }
        const res = await fetch(base + path, {
          ...options,
          headers,
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || res.statusText);
        }
        return res.json();
      }

      async function handleRegister() {
        const username = $("username-input").value.trim();
        const password = $("password-input").value.trim();
        $("auth-error").textContent = "";
        if (!username || !password) {
          $("auth-error").textContent = "Введите логин и пароль";
          return;
        }
        try {
          await api("/auth/register", {
            method: "POST",
            body: JSON.stringify({ username, password }),
          });
          await handleLogin();
        } catch (e) {
          $("auth-error").textContent = "Ошибка: " + (e.message || "не удалось зарегистрироваться");
        }
      }

      async function handleLogin() {
        const username = $("username-input").value.trim();
        const password = $("password-input").value.trim();
        $("auth-error").textContent = "";
        if (!username || !password) {
          $("auth-error").textContent = "Введите логин и пароль";
          return;
        }
        try {
          const base = "";
          const body = new URLSearchParams();
          body.set("username", username);
          body.set("password", password);
          body.set("grant_type", "");
          body.set("scope", "");
          body.set("client_id", "");
          body.set("client_secret", "");
          const res = await fetch(base + "/auth/token", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body,
          });
          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || res.statusText);
          }
          const data = await res.json();
          state.token = data.access_token;
          state.me = await api("/me");
          await requestNotificationPermission();
          setAuthVisible(true);
          await refreshContacts();
          connectWebSocket();
        } catch (e) {
          $("auth-error").textContent = "Ошибка входа: " + (e.message || "проверь логин/пароль");
        }
      }

      async function refreshContacts() {
        try {
          const contacts = await api("/relationships");
          state.contacts = contacts;
          renderContacts();
        } catch {
          // ignore
        }
      }

      function renderContacts() {
        const list = $("contacts-list");
        list.innerHTML = "";
        if (!state.contacts.length) {
          $("contacts-empty").style.display = "block";
          return;
        }
        $("contacts-empty").style.display = "none";
        state.contacts.forEach((rel) => {
          const div = document.createElement("div");
          div.style.display = "flex";
          div.style.justifyContent = "space-between";
          div.style.alignItems = "center";
          div.style.gap = "8px";

          const left = document.createElement("div");
          left.innerHTML = `<div style="font-size:14px">${rel.contact.full_name || rel.contact.username}</div>
                            <div class="muted">@${rel.contact.username}</div>`;

          const btn = document.createElement("button");
          btn.textContent = "Позвонить";
          btn.className = "btn-primary btn-small";
          btn.onclick = () => startCall(rel.contact.id);

          div.appendChild(left);
          div.appendChild(btn);
          list.appendChild(div);
        });
      }

      async function addContact() {
        const username = $("contact-username-input").value.trim();
        if (!username) return;
        try {
          await api("/relationships?username=" + encodeURIComponent(username), {
            method: "POST",
          });
          $("contact-username-input").value = "";
          await refreshContacts();
        } catch (e) {
          alert("Не удалось добавить контакт: " + (e.message || ""));
        }
      }

      async function startCall(contactId) {
        try {
          state.peerUserId = contactId;
          const call = await api("/calls", {
            method: "POST",
            body: JSON.stringify({
              type: "one_to_one",
              participant_ids: [contactId],
            }),
          });
          await handleCallUpdated(call);
          if (state.ws && state.me) {
            state.ws.send(
              JSON.stringify({
                type: "call-invite",
                call_id: call.id,
                from_user_id: state.me.id,
                to_user_id: contactId,
                payload: {
                  from_username: state.me.username,
                },
              })
            );
          }
        } catch (e) {
          alert("Не удалось создать звонок: " + (e.message || ""));
        }
      }

      async function handleCallUpdated(call) {
        state.activeCall = call;
        renderCall();
        await ensurePeerConnection(call);
      }

      function renderCall() {
        const section = $("call-section");
        const box = $("call-info");
        const endBtn = $("end-call-btn");
        if (!state.activeCall) {
          section.style.display = "none";
          box.innerHTML = "";
          if (endBtn) endBtn.style.display = "none";
          return;
        }
        section.style.display = "block";
        if (endBtn) endBtn.style.display = "inline-block";
        const call = state.activeCall;
        box.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div>
              <div style="font-size:14px;margin-bottom:2px">Звонок #${call.id}</div>
              <div class="muted">${call.type === "one_to_one" ? "1‑на‑1" : "Группа"}</div>
            </div>
            <span class="tag">${call.status}</span>
          </div>
          <div class="muted" style="margin-bottom:4px">
            call_id: <code>${call.id}</code>
          </div>
        `;
      }

      function renderIncomingCall() {
        const section = $("incoming-call-section");
        const fromSpan = $("incoming-from");
        if (!section || !fromSpan) return;
        if (!state.incomingCall) {
          section.style.display = "none";
          fromSpan.textContent = "";
          return;
        }
        section.style.display = "block";
        fromSpan.textContent = state.incomingCall.from_username || ("user #" + state.incomingCall.from_user_id);
      }

      function createPeerConnection() {
        if (state.pc) {
          state.pc.close();
          state.pc = null;
        }
        const iceServers = [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: ["turn:45.10.43.191:3478?transport=udp", "turn:45.10.43.191:3478?transport=tcp"],
            username: "nomax",
            credential: "nomaxpass",
          },
        ];
        const pc = new RTCPeerConnection({
          iceServers,
          iceTransportPolicy: "all",
        });
        rtcLog("PC created", { iceServers, peerUserId: state.peerUserId });
        pc.onicecandidate = (event) => {
          if (event.candidate && state.ws && state.me && state.activeCall && state.peerUserId) {
            rtcLog("Local ICE", event.candidate.candidate);
            state.ws.send(
              JSON.stringify({
                type: "webrtc-ice",
                call_id: state.activeCall.id,
                from_user_id: state.me.id,
                to_user_id: state.peerUserId,
                payload: { candidate: event.candidate },
              })
            );
          } else if (!event.candidate) {
            rtcLog("ICE gathering complete");
          }
        };
        pc.onicecandidateerror = (event) => {
          rtcLog("ICE candidate error", {
            url: event.url,
            errorCode: event.errorCode,
            errorText: event.errorText,
            address: event.address,
            port: event.port,
          });
        };
        pc.oniceconnectionstatechange = () => rtcLog("ICE state", pc.iceConnectionState);
        pc.onconnectionstatechange = () => rtcLog("PC state", pc.connectionState);
        pc.onsignalingstatechange = () => rtcLog("Signaling state", pc.signalingState);
        pc.ontrack = (event) => {
          if (!state.audioEl) {
            const audio = document.createElement("audio");
            audio.autoplay = true;
            audio.playsInline = true;
            document.body.appendChild(audio);
            state.audioEl = audio;
          }
          rtcLog("Remote track attached");
          state.audioEl.srcObject = event.streams[0];
        };
        state.pc = pc;
        return pc;
      }

      function getOtherParticipantId() {
        if (!state.activeCall || !state.me) return null;
        const others = state.activeCall.participant_ids.filter((id) => id !== state.me.id);
        return others[0] ?? null;
      }

      async function ensurePeerConnection(call) {
        try {
          const pc = createPeerConnection();
          rtcLog("ensurePeerConnection", { callId: call.id, ownerId: call.owner_id, me: state.me && state.me.id });
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Браузер блокирует доступ к микрофону. Нужен HTTPS (или localhost).");
            return;
          }
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          stream.getTracks().forEach((track) => pc.addTrack(track, stream));
          startStatsMonitor(call.id);

          // Создаём offer только если мы инициатор (пока считаем, что это создатель звонка)
          if (state.me && state.activeCall && state.activeCall.owner_id === state.me.id && state.ws) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            rtcLog("Offer created");
            state.ws.send(
              JSON.stringify({
                type: "webrtc-offer",
                call_id: state.activeCall.id,
                from_user_id: state.me.id,
                to_user_id: state.peerUserId,
                payload: { sdp: offer },
              })
            );
            rtcLog("Offer sent", { toUserId: state.peerUserId, callId: state.activeCall.id });
          }
        } catch (e) {
          console.error("WebRTC error", e);
        }
      }

      function connectWebSocket() {
        try {
          const proto = window.location.protocol === "https:" ? "wss" : "ws";
          const wsUrl = proto + "://" + window.location.host + "/ws/signaling";
          const ws = new WebSocket(wsUrl);
          state.ws = ws;
          ws.onopen = () => {
            if (state.me) {
              ws.send(
                JSON.stringify({
                  type: "register",
                  from_user_id: state.me.id,
                })
              );
            }
          };
          ws.onmessage = (event) => {
            try {
              const msg = JSON.parse(event.data);
              rtcLog("WS recv", msg);
              if (!msg.type) return;
              if (msg.type === "call-invite") {
                handleIncomingInvite(msg);
              } else if (msg.type === "call-reject") {
                handleCallRejected(msg);
              } else if (msg.type === "call-ended") {
                handleCallEnded(msg);
              } else if (msg.type === "webrtc-offer") {
                state.pendingOffer = msg;
                rtcLog("Pending offer saved", { callId: msg.call_id, from: msg.from_user_id });
              } else if (msg.type === "webrtc-answer") {
                handleIncomingAnswer(msg);
              } else if (msg.type === "webrtc-ice") {
                handleIncomingIce(msg);
              }
            } catch (e) {
              console.log("Signaling parse error", e);
            }
          };
          ws.onclose = () => {
            state.ws = null;
          };
        } catch {
          // ignore
        }
      }

      async function handleIncomingOffer(msg) {
        if (!state.me) return;
        try {
          state.peerUserId = msg.from_user_id || null;
          rtcLog("Handle incoming offer", { callId: msg.call_id, from: msg.from_user_id });
          const pc = createPeerConnection();
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert("Браузер блокирует доступ к микрофону. Нужен HTTPS (или localhost).");
            return;
          }
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
          stream.getTracks().forEach((track) => pc.addTrack(track, stream));
          startStatsMonitor(msg.call_id);

          const remoteDesc = new RTCSessionDescription(msg.payload.sdp);
          await pc.setRemoteDescription(remoteDesc);
          await flushQueuedIce(msg.call_id);
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          rtcLog("Answer created");

          if (state.ws) {
            state.ws.send(
              JSON.stringify({
                type: "webrtc-answer",
                call_id: msg.call_id,
                from_user_id: state.me.id,
                to_user_id: msg.from_user_id,
                payload: { sdp: answer },
              })
            );
            rtcLog("Answer sent", { toUserId: msg.from_user_id, callId: msg.call_id });
          }
        } catch (e) {
          console.error("Error handling offer", e);
        }
      }

      function handleIncomingInvite(msg) {
        if (!state.me || msg.to_user_id !== state.me.id) return;
        state.incomingCall = {
          call_id: msg.call_id,
          from_user_id: msg.from_user_id,
          from_username: msg.payload && msg.payload.from_username,
        };
        startIncomingAlert();
        showIncomingNotification(state.incomingCall.from_username);
        renderIncomingCall();
      }

      function handleCallRejected(msg) {
        if (!state.me || msg.to_user_id !== state.me.id) return;
        // Входящий отказ для инициатора
        stopIncomingAlert();
        cleanupCallState();
      }

      function handleCallEnded(msg) {
        if (!state.activeCall) return;
        if (msg.call_id !== state.activeCall.id) return;
        stopIncomingAlert();
        cleanupCallState();
      }

      async function acceptIncomingCall() {
        if (!state.incomingCall || !state.me) return;
        const callId = state.incomingCall.call_id;
        try {
          stopIncomingAlert();
          state.peerUserId = state.incomingCall.from_user_id || null;
          const call = await api(`/calls/${callId}/join`, { method: "POST" });
          state.activeCall = call;
          renderCall();
          if (state.pendingOffer) {
            await handleIncomingOffer(state.pendingOffer);
          }
        } catch (e) {
          console.error("Error joining call", e);
        } finally {
          state.incomingCall = null;
          state.pendingOffer = null;
          renderIncomingCall();
        }
      }

      function rejectIncomingCall() {
        if (!state.incomingCall || !state.me || !state.ws) return;
        stopIncomingAlert();
        state.ws.send(
          JSON.stringify({
            type: "call-reject",
            call_id: state.incomingCall.call_id,
            from_user_id: state.me.id,
            to_user_id: state.incomingCall.from_user_id,
          })
        );
        state.incomingCall = null;
        state.pendingOffer = null;
        renderIncomingCall();
      }

      async function endCurrentCall() {
        if (!state.activeCall || !state.me) return;
        const callId = state.activeCall.id;
        const otherId = state.peerUserId;
        if (state.ws && otherId) {
          state.ws.send(
            JSON.stringify({
              type: "call-ended",
              call_id: callId,
              from_user_id: state.me.id,
              to_user_id: otherId,
            })
          );
        }
        try {
          await api(`/calls/${callId}/end`, { method: "POST" });
        } catch {
          // игнорируем ошибки завершения на бэке
        }
        cleanupCallState();
      }

      function cleanupCallState() {
        stopIncomingAlert();
        if (state.pc) {
          state.pc.close();
          state.pc = null;
        }
        stopStatsMonitor();
        if (state.audioEl && state.audioEl.srcObject) {
          const tracks = state.audioEl.srcObject.getTracks?.() || [];
          tracks.forEach((t) => t.stop());
          state.audioEl.srcObject = null;
        }
        state.activeCall = null;
        state.peerUserId = null;
        state.pendingOffer = null;
        state.pendingIceByCall = {};
        renderCall();
      }

      async function handleIncomingAnswer(msg) {
        if (!state.pc) return;
        try {
          const remoteDesc = new RTCSessionDescription(msg.payload.sdp);
          await state.pc.setRemoteDescription(remoteDesc);
          rtcLog("Remote answer set", { callId: msg.call_id });
          await flushQueuedIce(msg.call_id);
        } catch (e) {
          console.error("Error handling answer", e);
        }
      }

      async function handleIncomingIce(msg) {
        if (!msg.payload || !msg.payload.candidate) return;
        if (!state.pc) {
          queueIce(msg.call_id, msg.payload.candidate);
          return;
        }
        if (!state.pc.remoteDescription) {
          queueIce(msg.call_id, msg.payload.candidate);
          return;
        }
        try {
          await state.pc.addIceCandidate(new RTCIceCandidate(msg.payload.candidate));
          rtcLog("Remote ICE added");
        } catch (e) {
          console.error("Error adding ICE candidate", e);
        }
      }

      $("login-btn").onclick = handleLogin;
      $("register-btn").onclick = handleRegister;
      $("add-contact-btn").onclick = addContact;
      $("incoming-accept-btn").onclick = acceptIncomingCall;
      $("incoming-reject-btn").onclick = rejectIncomingCall;
      $("end-call-btn").onclick = endCurrentCall;
    </script>
  </body>
  </html>
