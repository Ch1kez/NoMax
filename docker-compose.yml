version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomax-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=devsecret
      - LIVEKIT_HOST=ws://livekit:7880
    restart: unless-stopped
    depends_on:
      - livekit

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nomax-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: nomax-livekit
    command: --config /livekit/livekit.yaml
    volumes:
      - ./infra/livekit/livekit.yaml:/livekit/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-60000:50000-60000/udp"
    restart: unless-stopped

